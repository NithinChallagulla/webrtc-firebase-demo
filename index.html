<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC + Live Map Demo</title>

    <!-- Leaflet Map CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha512-o9N1jNf1NJeVvF47mJcZgjC5dxELkKYX2sMKYlN7M+J7X9YBRSV6LKqvmQkYjPBwFVG4YvF14iUn8CZTrUjfqQ=="
      crossorigin=""
    />

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }

      .videos {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
      }

      video {
        width: 300px;
        height: 225px;
        background: black;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }

      #map {
        height: 400px;
        width: 100%;
        margin-top: 40px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <h2>1. Start your Webcam</h2>
    <div class="videos">
      <span>
        <h3>Local Stream</h3>
        <video id="webcamVideo" autoplay playsinline></video>
      </span>
      <span>
        <h3>Remote Stream</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </span>
    </div>

    <div class="controls">
      <button id="webcamButton">Start webcam</button>
      <button id="muteButton" disabled>Mute Mic</button>
    </div>

    <h2>2. Create a new Call</h2>
    <button id="callButton" disabled>Create Call (offer)</button>
    <p>Room ID: <input id="callInput" readonly /></p>

    <h2>3. Join a Call</h2>
    <p>Answer the call from a different browser window or device</p>
    <input id="joinInput" placeholder="Enter Room ID" />
    <button id="answerButton" disabled>Answer</button>

    <h2>4. Hangup</h2>
    <button id="hangupButton" disabled>Hangup</button>

    <h2>Call Status</h2>
    <p id="callStatus">Idle</p>

    <h2>Live Map</h2>
    <div id="map"></div>

    <!-- Your main JavaScript -->
    <script type="module" src="/main.js"></script>

    <!-- Leaflet Map JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha512-YrwFf7JoZHi0bHTBeFWi3Flb1o8ymSMjtiKFT8mZWhksuQfXeXw3+E4iUs3Gz4tuKphOVzjyaq6+U/bpHAdYpw=="
      crossorigin=""
    ></script>

    <script>
      const map = L.map('map').setView([20.5937, 78.9629], 4); // Centered on India

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap',
      }).addTo(map);

      // Add 10 random markers
      for (let i = 0; i < 10; i++) {
        const lat = 8 + Math.random() * 20;   // 8 to 28 (India)
        const lng = 68 + Math.random() * 30;  // 68 to 98 (India)
        L.marker([lat, lng])
          .addTo(map)
          .bindPopup(`📍 Random Pin ${i + 1}`);
      }
    </script>
  </body>
</html>
