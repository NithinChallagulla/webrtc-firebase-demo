<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC + Google Maps Demo</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }

      .videos {
        display: flex;
        gap: 20px;
        margin-bottom: 10px;
      }

      video {
        width: 300px;
        height: 225px;
        background: black;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }

      #map {
        height: 400px;
        width: 100%;
        margin-top: 40px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <h2>1. Start your Webcam</h2>
    <div class="videos">
      <span>
        <h3>Local Stream</h3>
        <video id="webcamVideo" autoplay playsinline></video>
      </span>
      <span>
        <h3>Remote Stream</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </span>
    </div>

    <div class="controls">
      <button id="webcamButton">Start webcam</button>
      <button id="muteButton" disabled>Mute Mic</button>
    </div>

    <h2>2. Create a new Call</h2>
    <button id="callButton" disabled>Create Call (offer)</button>
    <p>Room ID: <input id="callInput" readonly /></p>

    <h2>3. Join a Call</h2>
    <p>Answer the call from a different browser window or device</p>
    <input id="joinInput" placeholder="Enter Room ID" />
    <button id="answerButton" disabled>Answer</button>

    <h2>4. Hangup</h2>
    <button id="hangupButton" disabled>Hangup</button>

    <h2>Call Status</h2>
    <p id="callStatus">Idle</p>

    <h2>Live Map (Google Maps)</h2>
    <div id="map"></div>

    <!-- Your main JavaScript -->
    <script type="module" src="/main.js"></script>

    <!-- Google Maps API Script (Replace KEY below with restricted one) -->
    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBpDkzRCsi5uyogOQTGl2J5SWXxGcEs-AM&callback=initMap">
    </script>

    <script>
      function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 5,
          center: { lat: 20.5937, lng: 78.9629 }, // Centered on India
        });

        // Add 10 random markers across India
        for (let i = 0; i < 10; i++) {
          const lat = 8 + Math.random() * 20;
          const lng = 68 + Math.random() * 30;

          new google.maps.Marker({
            position: { lat, lng },
            map,
            title: `📍 Random Pin ${i + 1}`,
          });
        }
      }

      // Required for callback to work
      window.initMap = initMap;
    </script>
  </body>
</html>
