<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC + Map</title>
    <link rel="icon" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Step 1: Start Your Webcam</h2>
    <div class="videos">
      <div>
        <h3>Local Stream</h3>
        <video id="webcamVideo" autoplay playsinline></video>
      </div>
      <div>
        <h3>Remote Stream</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>

    <div class="controls">
      <button id="webcamButton">🎥 Start Webcam</button>
      <button id="callButton" disabled>📞 Create Call (Offer)</button>

      <h3>Step 2: Join a Call</h3>
      <input id="callInput" placeholder="Enter Call ID" />
      <button id="answerButton" disabled>✅ Answer Call</button>

      <h3>Step 3: Hang Up</h3>
      <button id="hangupButton" disabled>⛔ Hang Up</button>
    </div>

    <h2>Live Map View</h2>
    <div id="map"></div>

    <script type="module" src="/main.js"></script>
    <script
      async
      defer
      src="https://maps.googleapis.com/maps/api/js?key=yY068Ewsfon2CoQlsAOz&callback=initMap"
    ></script>
  </body>
</html>
