<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC + Firebase</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    video {
      width: 45%;
      margin: 10px;
      border: 2px solid #444;
      border-radius: 8px;
    }
    #map {
      height: 300px;
      width: 100%;
      margin-top: 20px;
    }
    input {
      padding: 5px;
      margin: 5px;
      width: 250px;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background-color: #1976d2;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #aaa;
    }
    #callStatus {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>WebRTC + Firebase Demo</h1>

  <!-- Video Elements -->
  <video id="webcamVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>

  <!-- Controls -->
  <div>
    <button id="webcamButton">Start Webcam</button>
    <button id="callButton" disabled>Create Call</button>
    <input id="callInput" readonly placeholder="Call ID">
    <input id="joinInput" placeholder="Enter Call ID to Join">
    <button id="answerButton" disabled>Join Call</button>
    <button id="muteButton" disabled>Mute Mic</button>
    <button id="hangupButton" disabled>Hang Up</button>
  </div>

  <p id="callStatus">Idle</p>

  <!-- Map -->
  <div id="map"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>

  <!-- App Entry Point -->
  <script type="module" src="./main.js"></script>
</body>
</html>
